<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발사업 스마트 법규 검토 어시스턴트</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <a href="/" class="icon-btn" style="right: auto; left: 0; padding: 0.5rem 1rem; text-decoration: none; display: flex; align-items: center; gap: 0.4rem;">
                🏠 메인으로
            </a>
            <h1>🏛️ 개발사업 스마트 법규 검토</h1>
            <p>실제 법령 데이터와 AI를 활용하여 인허가를 완벽 분석합니다.</p>
        </header>

        <main class="app-main">
            <section class="input-section glass-panel">
                <h2>사업 개요 입력</h2>
                <form id="project-form">
                    <div class="form-group">
                        <label for="projectName">사업명</label>
                        <input type="text" id="projectName" placeholder="예: 구도심 도시재생사업" required>
                    </div>

                    <div class="form-group">
                        <label>주요 사업 분류 (공종)</label>
                        <div style="display: flex; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap;">
                            <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: normal; cursor: pointer;">
                                <input type="radio" name="projectType" value="건축공사" required> 건축공사 (신축, 리모델링 등)
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: normal; cursor: pointer;">
                                <input type="radio" name="projectType" value="토목공사" required> 토목공사 (도로, 교량, 하천 등)
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: normal; cursor: pointer;">
                                <input type="radio" name="projectType" value="조경공사" required> 조경공사 (공원 조성, 식재 등)
                            </label>
                            <label style="display: flex; align-items: center; gap: 0.4rem; font-weight: normal; cursor: pointer;">
                                <input type="radio" name="projectType" value="복합공사" checked required> 복합공사 (건축+토목+조경 등)
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="budget">사업 재원 (단위: 억 원)</label>
                            <input type="number" id="budget" placeholder="예: 150" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="budgetNational">국비(%)</label>
                            <input type="number" id="budgetNational" placeholder="0" min="0" max="100">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="budgetProvincial">도비(%)</label>
                            <input type="number" id="budgetProvincial" placeholder="0" min="0" max="100">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="budgetMunicipal">시군비(%)</label>
                            <input type="number" id="budgetMunicipal" placeholder="0" min="0" max="100">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>편입 필지 상세 입력 및 토지대장 검증</label>
                        <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.8rem;">
                            지번을 7단계로 정확히 입력하고 [대장 검증]을 눌러 실제 토지대장의 면적 및 지역지구 정보를 불러오세요. 검증 완료된 필지만 총 면적에 합산됩니다.
                        </p>
                        <div class="parcel-controls" style="display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center;">
                            <button type="button" id="add-parcel-btn" class="secondary-btn" style="padding: 0.5rem; font-size: 0.9rem; flex: 1;">➕ 1개 수동 추가</button>
                            <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display: none;">
                            <button type="button" id="upload-excel-btn" class="secondary-btn" style="padding: 0.5rem; font-size: 0.9rem; background-color: #10b981; color: white; border-color: #059669; flex: 1.5;">📊 엑셀 불러오기</button>
                            <button type="button" id="download-template-btn" class="secondary-btn" style="padding: 0.5rem; font-size: 0.9rem; background-color: #f8fafc; border-color: #cbd5e1; color: #475569; flex: 1;">📥 엑셀 양식</button>
                            <button type="button" id="clear-parcels-btn" class="secondary-btn" style="padding: 0.5rem; font-size: 0.9rem; margin-left: auto; color: #ef4444; border-color: #fca5a5; flex: 0.8;">🗑️ 전체 삭제</button>
                        </div>

                        <div style="overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 1rem;">
                            <table id="parcel-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; min-width: 800px;">
                                <thead>
                                    <tr style="background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                                        <th style="padding: 0.75rem; width: 60px; text-align: center;">상태</th>
                                        <th style="padding: 0.75rem; width: 250px;">주소 (수동 추가시 돋보기)</th>
                                        <th style="padding: 0.75rem; width: 140px;">상세지번</th>
                                        <th style="padding: 0.75rem; width: 90px;">면적(㎡)</th>
                                        <th style="padding: 0.75rem;">지목 및 지역지구 요약</th>
                                        <th style="padding: 0.75rem; width: 60px; text-align: center;">관리</th>
                                    </tr>
                                </thead>
                                <tbody id="parcel-container">
                                </tbody>
                            </table>
                        </div>
                        <button type="button" id="bulk-verify-btn" class="submit-btn" style="margin-top: 1rem; background-color: #2563eb; color: white; display: none;">
                            ✅ 등록된 전체 필지 토지이음 일괄 검증
                        </button>
                    </div>

                    <div class="form-group" style="padding: 1rem; background: #e0f2fe; border-radius: 8px;">
                        <label for="publicWaterArea">해상/공유수면 편입 면적 (㎡) - 지번이 없는 구역</label>
                        <input type="number" id="publicWaterArea" placeholder="0" min="0" value="0">
                        <p style="font-size: 0.85rem; color: #0284c7; margin-top: 0.5rem;">※ 입력 시 총 사업 면적에 합산되며, <공유수면 관리법> 등 인허가가 강력히 우선 검토됩니다.</p>
                    </div>
                    
                    <div class="form-group" style="background: #f1f5f9; padding: 1rem; border-radius: 8px;">
                        <label>검증된 총 사업 면적 (자동 합산)</label>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #2563eb;">
                            <span id="total-area">0</span> ㎡
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">주요 사업 내용 및 목적</label>
                        <textarea id="description" rows="4" placeholder="💡 AI가 법령을 정확히 검토할 수 있도록 사업 제원을 상세히 적어주세요.
(예시) 
- 최고 층수 5층, 건축물 최대 층높이 20m
- 최대 굴착깊이 12m
- 바다/공유수면 인접 및 편입 면적 500㎡ 포함
- 노후 공장 철거 후 공공도서관 신축"></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="analyze-btn">
                        <span id="btn-text">AI 기반 법규 및 지역지구 분석 시작</span>
                        <div class="spinner hidden" id="spinner"></div>
                    </button>
                </form>
            </section>

        </main>
    </div>

    </div>

    <!-- 카카오 주소 검색 API -->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="/static/script.js?v=5.0"></script>
</body>
</html>
