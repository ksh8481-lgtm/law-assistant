<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 공사감독 체크리스트 - LAW ASSISTANT</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-grad-1: #e0e7ff;
            --bg-grad-2: #f8fafc;
            --bg-grad-3: #f3e8ff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            position: relative;
        }
        .header-content h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .header-content p { color: var(--text-muted); font-size: 1rem; }
        .back-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover { background: white; transform: translateY(-2px); }
        
        .progress-container {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--card-border);
        }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-weight: 600; }
        .progress-bar-bg { height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }
        
        .filters {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-label { font-weight: 700; margin-right: 0.5rem; color: #334155; min-width: 60px; }
        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.9); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .checklist-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .check-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            gap: 1rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .check-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .check-card.critical { border-left: 5px solid var(--danger); }
        .check-card.completed { opacity: 0.6; background: #f8fafc; }
        .check-card.completed .card-title { text-decoration: line-through; color: #94a3b8; }
        
        .checkbox-wrapper { padding-top: 0.2rem; }
        .custom-checkbox {
            width: 24px; height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            background: white;
        }
        .custom-checkbox.checked { background: var(--primary); border-color: var(--primary); }
        .custom-checkbox.checked::after {
            content: '✓'; color: white; font-weight: bold; font-size: 14px;
        }
        
        .card-content { flex: 1; }
        .card-meta { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .tag {
            font-size: 0.75rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 4px;
        }
        .tag-phase { background: #e0f2fe; color: #0284c7; }
        .tag-cat { background: #f1f5f9; color: #475569; }
        .tag-law { background: #fef3c7; color: #d97706; }
        .tag-critical { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; display: inline-flex; align-items: center; gap: 0.2rem;}
        
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.4; transition: color 0.3s; }
        .card-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; }
        
        .card-actions { display: flex; gap: 0.5rem; }
        .action-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .btn-photo { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; }
        .btn-photo:hover { background: #e2e8f0; }
        .btn-nc { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
        .btn-nc:hover { background: #fee2e2; }
        
        .empty-state { text-align: center; padding: 4rem 0; color: var(--text-muted); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; max-width: 400px; width: 90%; text-align: center; transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-icon { font-size: 3rem; margin-bottom: 1rem; }
        .modal-btn { margin-top: 1.5rem; padding: 0.6rem 2rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🏗️ 스마트 공사감독 체크리스트</h1>
                <p>현장 소장 및 감독관을 위한 실시간 법정 필수 점검 시스템</p>
            </div>
            <a href="/" class="back-btn">🏠 메인으로</a>
        </header>

        <div class="progress-container">
            <div class="progress-header">
                <span>전체 진행률</span>
                <span id="progress-text">0% (0 / 0)</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-row" id="phase-filters">
                <div class="filter-label">단계별</div>
                <button class="filter-btn active" data-filter="전체">전체</button>
                <button class="filter-btn" data-filter="착공 전">착공 전</button>
                <button class="filter-btn" data-filter="시공 중">시공 중</button>
                <button class="filter-btn" data-filter="준공">준공</button>
            </div>
            <div class="filter-row" id="cat-filters">
                <div class="filter-label">분야별</div>
                <button class="filter-btn active" data-filter="전체">전체</button>
                <button class="filter-btn" data-filter="행정/기본">행정/기본</button>
                <button class="filter-btn" data-filter="안전/보건">안전/보건</button>
                <button class="filter-btn" data-filter="품질/시공">품질/시공</button>
                <button class="filter-btn" data-filter="환경/오염">환경/오염</button>
                <button class="filter-btn" data-filter="재해/방재">재해/방재</button>
                <button class="filter-btn" data-filter="기타">기타</button>
            </div>
        </div>

        <div id="loader" class="loader"></div>
        
        <div class="checklist-container" id="checklist">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <!-- Simulation Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">📸</div>
            <h2 id="modal-title" style="margin-bottom: 0.5rem;">기능 시뮬레이션</h2>
            <p id="modal-desc" style="color: #64748b; font-size: 0.95rem;">실제 서비스에서는 이 버튼을 통해 현장 사진 촬영 및 서버 전송이 이루어집니다.</p>
            <button class="modal-btn" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        let allItems = [];
        let completedIds = JSON.parse(localStorage.getItem('supervisor_completed') || '[]');
        let currentPhase = '전체';
        let currentCat = '전체';

        document.addEventListener('DOMContentLoaded', () => {
            fetchChecklist();
            setupFilters();
        });

        async function fetchChecklist() {
            try {
                const res = await fetch('/api/supervisor/checklist');
                const data = await res.json();
                if (data.success) {
                    allItems = data.data;
                    document.getElementById('loader').style.display = 'none';
                    renderCards();
                } else {
                    alert("데이터 로드 실패: " + data.message);
                }
            } catch (err) {
                console.error(err);
                alert("서버 연결에 실패했습니다.");
            }
        }

        function setupFilters() {
            document.querySelectorAll('#phase-filters .filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('#phase-filters .filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentPhase = e.target.dataset.filter;
                    renderCards();
                });
            });
            document.querySelectorAll('#cat-filters .filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCat = e.target.dataset.filter;
                    renderCards();
                });
            });
        }

        function renderCards() {
            const container = document.getElementById('checklist');
            container.innerHTML = '';
            
            let filtered = allItems.filter(item => {
                let pMatch = (currentPhase === '전체' || item.phase === currentPhase || item.phase === '전체');
                let cMatch = (currentCat === '전체' || item.category === currentCat);
                return pMatch && cMatch;
            });
            
            // Sort: Uncompleted first, then critical first
            filtered.sort((a, b) => {
                let aComp = completedIds.includes(a.id);
                let bComp = completedIds.includes(b.id);
                if (aComp !== bComp) return aComp ? 1 : -1;
                if (a.is_critical !== b.is_critical) return a.is_critical ? -1 : 1;
                return a.id - b.id;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">해당 필터에 맞는 항목이 없습니다.</div>`;
            } else {
                filtered.forEach(item => {
                    const isCompleted = completedIds.includes(item.id);
                    const card = document.createElement('div');
                    card.className = `check-card ${item.is_critical ? 'critical' : ''} ${isCompleted ? 'completed' : ''}`;
                    
                    const criticalBadge = item.is_critical ? `<span class="tag tag-critical">🚨 Red Flag (즉시 중지 사안)</span>` : '';
                    
                    card.innerHTML = `
                        <div class="checkbox-wrapper">
                            <div class="custom-checkbox ${isCompleted ? 'checked' : ''}" onclick="toggleCheck(${item.id})"></div>
                        </div>
                        <div class="card-content">
                            <div class="card-meta">
                                <span class="tag tag-phase">${item.phase}</span>
                                <span class="tag tag-cat">${item.category}</span>
                                <span class="tag tag-law">⚖️ ${item.law_reference}</span>
                                ${criticalBadge}
                            </div>
                            <div class="card-title">${item.check_item}</div>
                            <div class="card-desc">검측 방법: ${item.inspection_method}</div>
                            <div class="card-actions">
                                <button class="action-btn btn-photo" onclick="showModal('photo')">📸 사진 대지 작성</button>
                                <button class="action-btn btn-nc" onclick="showModal('nc')">⚠️ N/C (부적합) 발행</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
            updateProgress();
        }

        function toggleCheck(id) {
            if (completedIds.includes(id)) {
                completedIds = completedIds.filter(x => x !== id);
            } else {
                completedIds.push(id);
            }
            localStorage.setItem('supervisor_completed', JSON.stringify(completedIds));
            renderCards(); // Re-render to update classes and sort order
        }

        function updateProgress() {
            let total = allItems.length;
            let completed = completedIds.length;
            if (total === 0) return;
            
            let percentage = Math.round((completed / total) * 100);
            document.getElementById('progress-text').textContent = `${percentage}% (${completed} / ${total})`;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
        }

        function showModal(type) {
            const modal = document.getElementById('modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            
            if (type === 'photo') {
                icon.textContent = '📸';
                title.textContent = '현장 사진 첨부 시뮬레이션';
                desc.textContent = '실제 배포 버전에서는 스마트폰 카메라가 연동되어 촬영한 사진이 체크리스트 항목에 워터마크(날짜/시간)와 함께 자동 첨부됩니다.';
            } else if (type === 'nc') {
                icon.textContent = '⚠️';
                title.textContent = 'N/C(부적합) 발행 시뮬레이션';
                desc.textContent = '실제 배포 버전에서는 클릭 시 즉시 시정 조치 요구서(NCR) 템플릿이 생성되어 시공사 현장소장에게 알림톡/문자로 발송됩니다.';
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
</body>
</html>
