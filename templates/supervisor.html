<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감독관 체크 - LAW ASSISTANT</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 50%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f172a;
        }
        .coming-soon-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 500px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .back-btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: #2563eb;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 10px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #1e40af;
        }
    </style>
</head>
<body>
    <div class="coming-soon-container">
        <div class="icon">🚧</div>
        <h1>감독관 체크<br>서비스 준비 중입니다</h1>
        <p>현장 감독관을 위한 스마트 체크리스트 및 안전/품질 관리 시스템을 열심히 개발하고 있습니다. 조금만 기다려 주세요!</p>
        <a href="/" class="back-btn">메인으로 돌아가기</a>
    </div>
</body>
</html>
